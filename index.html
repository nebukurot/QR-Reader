<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かんたんQRリーダー</title>
    <!-- QRコード解析ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 高齢者向けの大きくて見やすい案内 */
        #message-box {
            width: 100%;
            background-color: #ffeb3b;
            color: #000;
            text-align: center;
            padding: 15px 0;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 狙いを定めやすくするための赤いガイド枠 */
        #scan-frame {
            position: absolute;
            border: 4px solid #00ff00;
            width: 250px;
            height: 250px;
            box-sizing: border-box;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        #loading {
            position: absolute;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="message-box">しかく のなかに QRコードを うつしてね</div>
    
    <div id="video-container">
        <div id="loading">カメラを じゅんび中...</div>
        <video id="video" playsinline></video>
        <div id="scan-frame"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const loading = document.getElementById('loading');
    let isScanning = true;

    // カメラの起動設定（より柔軟な指定に変更しました）
    const constraints = {
        video: {
            // 基本は背面カメラを最優先する（強要はしない設定に変更）
            facingMode: "environment",
            // スマホでピントが合いやすいように解像度の目安を指定
            width: { ideal: 1280 },
            height: { ideal: 720 }
        }
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true); // iOS（Safari）対策
            video.play();
            requestAnimationFrame(tick);
        })
        .catch(function(err) {
            console.error("カメラ起動エラー: ", err);
            // エラー時の案内を、高齢者の方でも分かりやすい言葉にしました
            alert("カメラがうごきませんでした。\n「カメラの利用を許可（きょか）」するか、画面をもう一度開きなおしてみてください。");
        });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
            loading.style.display = "none";
            
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "attemptBoth",
            });

            if (code) {
                isScanning = false; 
                
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }

                if (code.data.startsWith("http://") || code.data.startsWith("https://")) {
                    window.location.href = code.data;
                } else {
                    alert("読み取った内容:\n" + code.data);
                    setTimeout(() => { isScanning = true; }, 2000);
                }
                return;
            }
        }
        requestAnimationFrame(tick);
    }
</script>    
</body>
</html>
