<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かんたんQRリーダー</title>
    
    <!-- ホーム画面用アイコンとPWA設定の読み込み -->
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #message-box {
            width: 100%;
            background-color: #ffeb3b;
            color: #000;
            text-align: center;
            padding: 15px 0;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #video-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 60px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #scan-frame {
            position: absolute;
            border: 4px solid #00ff00;
            width: 250px;
            height: 250px;
            box-sizing: border-box;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        #loading {
            position: absolute;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- ご要望に合わせてメッセージを変更しました -->
    <div id="message-box">四角 のなかに QRコードを 写してね</div>
    
    <div id="video-container">
        <div id="loading">カメラを 準備中...</div>
        <video id="video" autoplay muted playsinline></video>
        <div id="scan-frame"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        let isScanning = true;

        // 心地よい「ピピッ」という音を鳴らす関数
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                function playNote(freq, startTime, duration) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = 'sine'; // 耳に優しい丸い音
                    oscillator.frequency.value = freq;
                    
                    gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime + startTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start(audioCtx.currentTime + startTime);
                    oscillator.stop(audioCtx.currentTime + startTime + duration);
                }

                // ピ・ピッ と2回鳴らす
                playNote(880, 0, 0.1);    
                playNote(1046.5, 0.15, 0.15); 
            } catch(e) {
                console.log("音が鳴らせませんでした", e);
            }
        }

        const constraints = {
            video: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                video.srcObject = stream;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(tick);
            })
            .catch(function(err) {
                alert("カメラがうごきませんでした。\n「カメラの利用を許可（きょか）」するか、画面をもう一度開きなおしてみてください。");
            });

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && isScanning) {
                loading.style.display = "none";
                
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "attemptBoth",
                });

                if (code) {
                    isScanning = false; 
                    
                    if (navigator.vibrate) {
                        navigator.vibrate(200);
                    }

                    // ピピッと音を鳴らす
                    playBeep();

                    // 音が聞こえるように、0.6秒待ってからページを開く
                    setTimeout(() => {
                        if (code.data.startsWith("http://") || code.data.startsWith("https://")) {
                            window.location.href = code.data;
                        } else {
                            alert("読み取った内容:\n" + code.data);
                            isScanning = true;
                        }
                    }, 600);
                    
                    return;
                }
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
